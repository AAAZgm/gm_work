; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = airm2m_core_esp32c3_wifi

; ; ===== 环境 3: 硬件诊断版（排查 SPI 通信用）=====
; [env:airm2m_core_esp32c3_diag]
; platform = espressif32
; board = airm2m_core_esp32c3
; framework = arduino
; build_src_filter = +<main_diag.cpp> -<main.cpp> -<main_wifi.cpp>
; build_flags =
;     -DARDUINO_USB_CDC_ON_BOOT=1

; ; ===== 环境 1: 串口版 =====
; [env:airm2m_core_esp32c3]
; platform = espressif32
; board = airm2m_core_esp32c3
; framework = arduino
; build_src_filter = +<*> -<main_wifi.cpp>

; ===== 环境 2: WiFi 版 =====
[env:airm2m_core_esp32c3_wifi]
platform = espressif32
board = airm2m_core_esp32c3
framework = arduino
build_src_filter = +<*> -<main.cpp> -<main_diag.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    links2004/WebSockets@^2.4.2
