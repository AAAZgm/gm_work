# 模型配置（官方YOLOv8，无需本地模型路径）
model:
  yolo_version: "yolov8"              # 官方YOLO版本
  yolo_conf: 0.5                      # 检测置信度阈值
  llm_path: "/home/sunrise/gm_car/colcon_ws/src/lla_cpp/config/Qwen2.5-0.5B-Instruct-Q4_0.gguf"  # 大模型路径

# ROS2话题配置（对接官方YOLO话题）
topic:
  dnn_detection: "/hobot_dnn_detection"  # 官方YOLO检测结果话题
  hbmem_img: "/hbmem_img"                # 官方摄像头图像话题
  user_cmd: "/car/user_cmd"              # 用户指令输入话题
  cmd_vel: "/cmd_vel"                    # 小车速度控制话题
  vision_desc: "/car/vision_desc"        # 视觉描述输出话题
  object_coords: "/car/object_coords"    # 物体坐标输出话题
  llm_cmd: "/car/llm_cmd"                # LLM解析后的指令话题
  exec_result: "/car/exec_result"        # 执行结果反馈话题

# 小车物理参数
car:
  base_linear_speed: 0.2    # 基础线速度 (m/s)
  base_angular_speed: 0.5   # 基础角速度 (rad/s)
  rad_per_degree: 0.01745   # 角度转弧度系数
  wheel_base: 0.2           # 轮距 (m)
  img_width: 640            # 官方YOLO输入宽度
  img_height: 640           # 官方YOLO输入高度